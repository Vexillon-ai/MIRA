sha256    = "594bf4e7d15b622157a54915de7e458c208e3363d61a5e488d8abfbda9aff3e5"
lib_path  = "jdk-25.0.3+9-jre/Contents/Home/bin/java"

[deps.jre.macos-aarch64]
