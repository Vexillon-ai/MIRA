# ── Node.js (LTS) ─────────────────────────────────────────────────────
# Runtime for npx-based MCP servers (everything, filesystem, memory,
# sequential-thinking, puppeteer). Bundling it means those servers work on
# any host — including a Windows service running as LocalSystem, which can't
# see a user-only Node install. `lib_path` points at the `npx` launcher; its
# parent dir is prepended to the MCP child's PATH so npx finds `node`.
# `auto = false`: fetched on demand, with the user's consent, when an
# npx-based MCP server is added.
[deps.node]
version      = "24.18.0"
description  = "Node.js LTS — runtime for npx-based MCP servers."
required_for = "npx-based MCP servers"
auto         = false

[deps.node.linux-x86_64]
url       = "https://nodejs.org/dist/v24.18.0/node-v24.18.0-linux-x64.tar.gz"
sha256    = "783130984963db7ba9cbd01089eaf2c2efb055c7c1693c943174b967b3050cb8"
lib_path  = "node-v24.18.0-linux-x64/bin/npx"

[deps.node.linux-aarch64]
url       = "https://nodejs.org/dist/v24.18.0/node-v24.18.0-linux-arm64.tar.gz"
sha256    = "6b4484c2190274175df9aa8f28e2d758a819cb1c1fe6ab481e2f95b463ab8508"
lib_path  = "node-v24.18.0-linux-arm64/bin/npx"

[deps.node.macos-x86_64]
