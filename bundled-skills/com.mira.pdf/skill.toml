[skill]
id            = "com.mira.pdf"
version       = "0.1.0"
display_name  = "PDF Tools"
description   = "Extract text from PDF files in the user's workspace and summarise into structured notes."
authors       = ["MIRA Team <hello@mira.dev>"]
license       = "MIT"

[permissions]
network_egress                   = []
filesystem                       = []
subprocess                       = false
secrets                          = []
llm_providers                    = ["primary"]
max_llm_spend_per_invocation_usd = 0.50

[tools]
extract   = { kind = "builtin", impl = "pdf_extract" }
summarize = { kind = "prompt",  template = "prompts/summarize.md" }
